<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>롤토체스 티어덱 사이트</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:40px;
}

h1{
    color:#38bdf8;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
    margin-top:20px;
}

#deckList{
    margin-top:30px;
    display:none;
}

.deck{
    background:#1e293b;
    margin:15px auto;
    padding:15px;
    width:350px;
    border-radius:10px;
}

.units{
    margin-top:10px;
    font-size:15px;
    color:#cbd5f5;
}
</style>
</head>

<body>

<h1>롤토체스 티어덱 목록</h1>
<p>버튼을 눌러 현재 메타 티어덱과 유닛 구성을 확인하세요.</p>

<button onclick="showDecks()">티어덱 보기</button>

<div id="deckList">

    <div class="deck">
        🥇 S티어 : 요네 덱
        <div class="units">
            유닛: 요네, 야스오, 세트, 리신, 쉔, 케넨
        </div>
    </div>

    <div class="deck">
        🥇 S티어 : 아리 덱
        <div class="units">
            유닛: 아리, 니코, 룰루, 아우렐리온 솔, 애니
        </div>
    </div>

    <div class="deck">
        🥈 A티어 : 카이사 덱
        <div class="units">
            유닛: 카이사, 벨코즈, 카사딘, 말자하
        </div>
    </div>

    <div class="deck">
        🥉 B티어 : 가렌 덱
        <div class="units">
            유닛: 가렌, 럭스, 자르반, 소나
        </div>
    </div>

</div>

<script>
function showDecks(){
    document.getElementById("deckList").style.display = "block";
}
</script>

</body>
</html>
