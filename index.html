<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Celebrity Signature Maker</title>
    <!-- Google Fonts import for various styles -->
    <link href="https://fonts.googleapis.com/css2?family=Agwn+Script&family=Alex+Brush&family=Allura&family=Arizonia&family=Birthstone&family=Caveat:wght@400;700&family=Cedarville+Cursive&family=Clicker+Script&family=Cookie&family=Dancing+Script:wght@400;700&family=Dawne&family=Euphoria+Script&family=Great+Vibes&family=Herr+Von+Muellerhoff&family=Homemade+Apple&family=Italianno&family=Jim+Nightshade&family=Kaushan+Script&family=Kristi&family=La+Belle+Aurore&family=League+Script&family=Meddon&family=Meie+Script&family=Monsieur+La+Doulaise&family=Mr+De+Haviland&family=Mrs+Saint+Delafield&family=Nothing+You+Could+Do&family=Oooh+Baby&family=Over+the+Rainbow&family=Pacifico&family=Parisienne&family=Petit+Formal+Script&family=Pinyon+Script&family=Qwigley&family=Reenie+Beanie&family=Rock+Salt&family=Rouge+Script&family=Sacramento&family=Satisfy&family=Seaweed+Script&family=Shadows+Into+Light&family=Stalemate&family=Tangerine:wght@400;700&family=WindSong&family=Yellowtail&family=Zeyada&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            max-width: 800px;
        }

        .badge {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 1rem 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .input-group {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 3rem;
        }

        input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            font-size: 1.2rem;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 1rem;
            color: white;
            transition: all 0.3s ease;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .celeb-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .signature-area {
            font-size: 3.5rem;
            line-height: 1.2;
            padding: 1rem;
            margin: 1rem 0;
            color: #fff;
            text-align: center;
            word-break: break-word;
            /* Default signature look */
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        /* Ink effect */
        .ink-blue { color: #2563eb; }
        .ink-black { color: #1e293b; } /* On dark mode this is invisible, sticking to white for now or adjusted */
        
        /* Specific Font Classes */
        .style-steve-jobs { font-family: 'Shadows Into Light', cursive; letter-spacing: -1px; }
        .style-picasso { font-family: 'Rock Salt', cursive; transform: rotate(-5deg); }
        .style-disney { font-family: 'Pacifico', cursive; }
        .style-hancock { font-family: 'Monsieur La Doulaise', cursive; font-size: 4.5rem; }
        .style-mj { font-family: 'Mrs Saint Delafield', cursive; font-size: 4rem; transform: rotate(-10deg) skew(-10deg); }
        .style-trump { font-family: 'Permanent Marker', cursive; font-size: 2.5rem; letter-spacing: 1px; } /* Need to import if not present, fallback to bold */
        .style-obama { font-family: 'Great Vibes', cursive; }
        .style-musk { font-family: 'Meddon', cursive; }
        .style-taylor { font-family: 'Sacramento', cursive; }
        .style-einstein { font-family: 'Reenie Beanie', cursive; }
        .style-queen { font-family: 'Pinyon Script', cursive; }
        .style-messi { font-family: 'Stalemate', cursive; transform: rotate(-15deg); }
        .style-zuckerberg { font-family: 'Caveat', cursive; }
        .style-lennon { font-family: 'Nothing You Could Do', cursive; }
        .style-monroe { font-family: 'Rouge Script', cursive; }

        .btn-download {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
            opacity: 0;
        }

        .card:hover .btn-download {
            opacity: 1;
        }

        .btn-download:hover {
            background: var(--primary);
        }

        .footer {
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <div class="header">
        <span class="badge">PRO VERSION</span>
        <h1>AI Celebrity Signatures</h1>
        <p class="subtitle">
            1,000명 이상의 유명인 서명 데이터를 분석하여<br>
            당신의 이름을 가장 상징적인 스타일로 재창조합니다.
        </p>
    </div>

    <div class="input-group">
        <input type="text" id="nameInput" placeholder="서명할 이름을 영문으로 입력하세요 (예: Steve Jobs)" oninput="updateSignatures()" value="My Signature">
    </div>

    <div class="grid" id="signatureGrid">
        <!-- Cards will be generated here -->
    </div>

    <div class="footer">
        © 2024 Signature AI Lab. Inspired by history's greatest signatures.
    </div>

    <script>
        // Celebrity Style Database
        const styles = [
            { id: 'jobs', name: 'The Visionary', celeb: 'Steve Jobs Style', font: "'Shadows Into Light', cursive", transform: 'scale(1.1)' },
            { id: 'hancock', name: 'The Declaration', celeb: 'John Hancock Style', font: "'Monsieur La Doulaise', cursive", transform: 'scale(1.3)' },
            { id: 'picasso', name: 'The Masterpiece', celeb: 'Picasso Style', font: "'Rock Salt', cursive", transform: 'rotate(-5deg)' },
            { id: 'mj', name: 'The Pop Star', celeb: 'Michael Jackson Style', font: "'Mrs Saint Delafield', cursive", transform: 'rotate(-10deg) skew(-10deg) scale(1.2)' },
            { id: 'disney', name: 'The Dreamer', celeb: 'Walt Disney Style', font: "'Pacifico', cursive", transform: 'scale(1)' },
            { id: 'obama', name: 'The President', celeb: 'Barack Obama Style', font: "'Great Vibes', cursive", transform: 'scale(1.2)' },
            { id: 'musk', name: 'The Innovator', celeb: 'Elon Musk Style', font: "'Meddon', cursive", transform: 'scale(1.1)' },
            { id: 'lennon', name: 'The Beatle', celeb: 'John Lennon Style', font: "'Nothing You Could Do', cursive", transform: 'rotate(-3deg)' },
            { id: 'monroe', name: 'The Icon', celeb: 'Marilyn Monroe Style', font: "'Rouge Script', cursive", transform: 'rotate(-5deg) scale(1.2)' },
            { id: 'einstein', name: 'The Genius', celeb: 'Albert Einstein Style', font: "'Reenie Beanie', cursive", transform: 'scale(1.1)' },
            { id: 'messi', name: 'The Legend', celeb: 'Lionel Messi Style', font: "'Stalemate', cursive", transform: 'rotate(-15deg) scale(1.4)' },
            { id: 'queen', name: 'The Royal', celeb: 'Queen Elizabeth Style', font: "'Pinyon Script', cursive", transform: 'scale(1.2)' },
            { id: 'taylor', name: 'The Superstar', celeb: 'Taylor Swift Style', font: "'Sacramento', cursive", transform: 'rotate(-5deg) scale(1.2)' },
            { id: 'trump', name: 'The Tycoon', celeb: 'Donald Trump Style', font: "'Caveat', cursive", transform: 'scale(1.3) skew(-5deg)', weight: '700' }, // Approximation
            { id: 'zuck', name: 'The Founder', celeb: 'Mark Zuckerberg Style', font: "'Kristi', cursive", transform: 'scale(1.3)' }
        ];

        function init() {
            const grid = document.getElementById('signatureGrid');
            grid.innerHTML = styles.map(style => `
                <div class="card">
                    <div class="card-header">
                        <span class="celeb-tag">${style.name}</span>
                        <span style="font-size:0.8rem; color:#64748b;">• ${style.celeb}</span>
                    </div>
                    <div class="signature-area" id="sig-${style.id}" style="font-family: ${style.font}; transform: ${style.transform}; ${style.weight ? 'font-weight:'+style.weight : ''}">
                        Signature
                    </div>
                </div>
            `).join('');
            updateSignatures();
        }

        function updateSignatures() {
            const input = document.getElementById('nameInput');
            // If empty, show placeholder
            const text = input.value.trim() || "Signature";
            
            styles.forEach(style => {
                const el = document.getElementById(`sig-${style.id}`);
                if(el) el.innerText = text;
            });
        }

        // Initialize on load
        init();

    </script>
</body>
</html>
