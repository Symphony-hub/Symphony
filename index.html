<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싸인 메이커 - 이름을 싸인으로</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&family=Caveat:wght@400;700&family=Satisfy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-size: 2rem;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 2rem;
        }
        input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
            text-align: center;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        @media (max-width: 480px) {
            .preview-grid {
                grid-template-columns: 1fr;
            }
        }
        .signature-card {
            padding: 1.5rem;
            border: 1px solid #f1f5f9;
            border-radius: 1rem;
            background: #fafafa;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            position: relative;
        }
        .signature-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .signature-item {
            font-size: 2.2rem;
            word-break: break-all;
            color: #1e293b;
        }
        .font-name {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .dancing { font-family: 'Dancing Script', cursive; }
        .pacifico { font-family: 'Pacifico', cursive; }
        .caveat { font-family: 'Caveat', cursive; }
        .satisfy { font-family: 'Satisfy', cursive; }
        
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖋️ 멋진 싸인 만들기</h1>
        <p class="subtitle">이름을 입력하면 스타일리시한 싸인으로 변환합니다.</p>
        
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: Hong Gildong)" oninput="updateSignature()">
        
        <div id="preview" class="preview-grid">
            <div class="signature-card">
                <div id="sig1" class="signature-item dancing">Signature</div>
                <span class="font-name">Dancing Script</span>
            </div>
            <div class="signature-card">
                <div id="sig2" class="signature-item pacifico">Signature</div>
                <span class="font-name">Pacifico</span>
            </div>
            <div class="signature-card">
                <div id="sig3" class="signature-item caveat">Signature</div>
                <span class="font-name">Caveat</span>
            </div>
            <div class="signature-card">
                <div id="sig4" class="signature-item satisfy">Signature</div>
                <span class="font-name">Satisfy</span>
            </div>
        </div>
    </div>
    
    <div class="footer">
        © 2024 Signature Maker. All rights reserved.
    </div>

    <script>
        function updateSignature() {
            const name = document.getElementById('nameInput').value || 'Signature';
            document.getElementById('sig1').innerText = name;
            document.getElementById('sig2').innerText = name;
            document.getElementById('sig3').innerText = name;
            document.getElementById('sig4').innerText = name;
        }
    </script>
</body>
</html>
