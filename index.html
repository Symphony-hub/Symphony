<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePick - AI 영화 추천 서비스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e50914; /* Netflix Red */
            --bg: #141414;
            --card-bg: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --accent: #f5c518; /* IMDb Gold */
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 2rem;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            max-width: 800px;
        }

        .badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-weight: 900; 
            font-size: 3.5rem; 
            margin: 0; 
            letter-spacing: -1px; 
            color: var(--text-main);
        }

        .description { 
            color: var(--text-dim); 
            margin-top: 1rem; 
            font-size: 1.2rem; 
            line-height: 1.6;
        }

        .action-container {
            width: 100%;
            max-width: 650px;
            margin-bottom: 4rem;
            text-align: center;
        }

        .recommend-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1.2rem 3rem;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .recommend-btn:hover { 
            transform: translateY(-5px) scale(1.05);
            background: #ff0a16;
            box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4);
        }

        .recommend-btn:active { transform: translateY(0) scale(1); }

        .movie-display {
            width: 100%;
            max-width: 900px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #333;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
            display: none;
        }

        .movie-card.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .movie-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1.5rem;
        }

        .movie-title-info h2 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--text-main);
            font-family: 'Playfair Display', serif;
        }

        .movie-meta {
            color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 0.5rem;
            display: flex;
            gap: 15px;
        }

        .section-title {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            display: block;
        }

        .movie-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .reason-box, .plot-box {
            line-height: 1.7;
        }

        .movie-text {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        /* Inquiry Form & Disqus (Preserved and Adjusted) */
        .inquiry-section, #disqus_thread {
            width: 100%;
            max-width: 800px;
            margin: 5rem auto 2rem;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }

        .inquiry-section h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-family: inherit;
            background: #141414;
            color: white;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.2);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .footer {
            margin-top: 5rem;
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            padding-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .movie-content { grid-template-columns: 1fr; gap: 2rem; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="badge">AI Movie Curator v1.0</span>
        <h1>CinePick</h1>
        <p class="description">당신의 취향을 분석하여 오늘 밤 꼭 봐야 할 영화를 추천해 드립니다.<br>검증된 명작부터 숨겨진 보석까지, 지금 바로 만나보세요.</p>
    </div>

    <div class="action-container">
        <button class="recommend-btn" onclick="recommendMovie()">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"></path></svg>
            오늘의 영화 추천받기
        </button>
    </div>

    <div class="movie-display" id="movieDisplay">
        <!-- Movie Card will be injected here -->
    </div>

    <section class="inquiry-section">
        <h2>제휴 및 광고 문의</h2>
        <form action="https://formspree.io/f/xnjgrppn" method="POST">
            <div class="form-group">
                <label for="name">성함</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
            </div>
            <div class="form-group">
                <label for="company">회사명</label>
                <input type="text" id="company" name="company" placeholder="회사/단체 이름">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="제휴 관련 문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
    </section>

    <div id="disqus_thread"></div>
    <script>
        (function() { 
        var d = document, s = d.createElement('script');
        s.src = 'https://symphony-3.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

    <div class="footer">
        © 2024 CinePick AI. All rights reserved. Cinematic Intelligence Engine.
    </div>

    <script>
        const MOVIES = [
            {
                title: "인셉션 (Inception)",
                year: 2010,
                genre: "SF/액션",
                rating: "9.3",
                reason: "꿈속의 꿈이라는 독창적인 소재와 크리스토퍼 놀란 감독의 치밀한 연출이 돋보입니다. 단순한 액션을 넘어 인간의 무의식과 기억에 대한 깊은 통찰을 제공합니다.",
                plot: "타인의 꿈에 들어가 생각을 훔치는 추출가 코브. 그는 아내를 죽였다는 누명을 벗기 위해 기업의 후계자에게 새로운 생각을 심는 '인셉션' 작전을 수행하게 됩니다."
            },
            {
                title: "어바웃 타임 (About Time)",
                year: 2013,
                genre: "로맨스/판타지",
                rating: "9.1",
                reason: "시간 여행이라는 소재를 통해 '오늘'이라는 하루가 얼마나 소중한지를 따뜻하게 그려냅니다. 연인과의 사랑뿐만 아니라 가족애를 다루며 깊은 감동을 줍니다.",
                plot: "성인이 된 날, 아버지로부터 시간을 되돌릴 수 있는 능력이 있다는 가문의 비밀을 듣게 된 팀. 그는 꿈에 그리던 여인 메리의 사랑을 얻기 위해 자신의 능력을 사용하기 시작합니다."
            },
            {
                title: "기생충 (Parasite)",
                year: 2019,
                genre: "드라마/스릴러",
                rating: "9.5",
                reason: "한국 영화 최초의 칸 영화제 황금종려상 수상작으로, 계급 사회의 문제를 블랙 코미디와 스릴러의 경계를 넘나들며 완벽하게 표현했습니다.",
                plot: "전원 백수로 살 길 막막한 기택네 장남 기우가 고액 과외 면접을 위해 박사장네 집에 발을 들이면서 두 가족의 걷잡을 수 없는 만남이 시작됩니다."
            },
            {
                title: "인터스텔라 (Interstellar)",
                year: 2014,
                genre: "SF/드라마",
                rating: "9.4",
                reason: "우주 과학에 대한 고증과 부성애라는 감동적인 서사가 결합된 걸작입니다. 광활한 우주를 배경으로 인류의 희망과 사랑의 힘을 장엄하게 그려냈습니다.",
                plot: "식량 부족으로 멸망해가는 지구를 구하기 위해 사랑하는 딸을 뒤로하고 희망을 찾아 우주로 떠나는 쿠퍼. 그는 시공간의 벽을 넘어 인류를 구할 단서를 찾아 헤맵니다."
            },
            {
                title: "쇼생크 탈출 (The Shawshank Redemption)",
                year: 1994,
                genre: "드라마",
                rating: "9.6",
                reason: "인간의 자유에 대한 갈망과 희망의 가치를 가장 감동적으로 풀어낸 영화입니다. 절망적인 상황 속에서도 끝까지 잃지 않는 인간 존엄성을 보여줍니다.",
                plot: "아내와 정부를 살해했다는 누명을 쓰고 쇼생크 교도소에 수감된 은행가 앤디. 그는 비참한 현실 속에서도 희망을 버리지 않고 조용히 자신만의 탈출을 준비합니다."
            },
            {
                title: "라라랜드 (La La Land)",
                year: 2016,
                genre: "뮤지컬/로맨스",
                rating: "8.9",
                reason: "꿈을 쫓는 청춘들의 열정과 사랑, 그리고 현실과의 타협을 아름다운 음악과 색채로 표현했습니다. 영화가 끝난 뒤에도 오랫동안 남는 여운이 일품입니다.",
                plot: "재즈 피아니스트 세바스찬과 배우 지망생 미아. 인생에서 가장 빛나는 순간 만난 두 사람은 서로의 꿈을 응원하며 사랑에 빠지지만, 현실의 벽에 부딪히게 됩니다."
            }
        ];

        let currentMovie = null;

        function recommendMovie() {
            const display = document.getElementById('movieDisplay');
            let nextMovie;
            
            // Avoid same movie twice
            do {
                nextMovie = MOVIES[Math.floor(Math.random() * MOVIES.length)];
            } while (nextMovie === currentMovie);
            
            currentMovie = nextMovie;

            // Simple transition effect
            display.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="movie-header">
                    <div class="movie-title-info">
                        <h2>${currentMovie.title}</h2>
                        <div class="movie-meta">
                            <span>📅 ${currentMovie.year}</span>
                            <span>🎞️ ${currentMovie.genre}</span>
                            <span>⭐ ${currentMovie.rating}</span>
                        </div>
                    </div>
                </div>
                <div class="movie-content">
                    <div class="reason-box">
                        <span class="section-title">추천 이유</span>
                        <p class="movie-text">${currentMovie.reason}</p>
                    </div>
                    <div class="plot-box">
                        <span class="section-title">줄거리</span>
                        <p class="movie-text">${currentMovie.plot}</p>
                    </div>
                </div>
            `;
            
            display.appendChild(card);
            
            // Trigger animation
            setTimeout(() => {
                card.classList.add('active');
            }, 50);

            // Scroll to the card
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
